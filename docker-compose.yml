# Canonical dev environment for Pulse.
#   docker compose up --build
services:
  postgres:
    # pgvector/pgvector, not the plain postgres image: business_knowledge
    # (app/models/knowledge.py) needs the vector extension pgvector provides
    # for RAG retrieval — vanilla postgres:16-alpine doesn't ship it, and
    # `alembic upgrade head` fails on CREATE EXTENSION vector without it.
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: pulse
      POSTGRES_DB: pulse
    ports:
      - "5432:5432"
    volumes:
      - ./.postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
    # `uv run` activates the image's venv; a bare `uvicorn` isn't on PATH.
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    environment:
      # Self-contained local stack: the compose Postgres has no SSL/pooler, so
      # override the Supabase-oriented flags from .env.
      DATABASE_URL: postgresql+asyncpg://pulse:pulse@postgres:5432/pulse
      DB_USE_PGBOUNCER: "false"
      DB_SSL: ""
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - ./backend:/app
      - /app/.venv # keep the image's Linux venv; don't let the host's shadow it
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
    command: uv run celery -A app.workers.celery_app.celery worker --beat --loglevel=info
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://pulse:pulse@postgres:5432/pulse
      DB_USE_PGBOUNCER: "false"
      DB_SSL: ""
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - ./backend:/app
      - /app/.venv
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    command: npm run dev -- --host 0.0.0.0
    env_file: .env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - api
